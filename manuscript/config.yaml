# template_newspaper — manuscript configuration
#
# This manuscript is a short, descriptive paper ABOUT the layout engine. It
# exists so the repository pipeline's Stage 03 (infrastructure manuscript
# renderer) produces a standard PDF for this project, exactly like the sibling
# templates. The *newspaper* PDF itself is produced separately by scripts/ in
# Stage 02 (see ../README.md).

paper:
  title: "The Triplicate: A Data-Driven Large-Format Newspaper Layout Engine"
  subtitle: "Designed multi-column page layout as a reproducible-research exemplar"
  version: "1.0.2"

authors:
  - name: "Daniel Ari Friedman"
    orcid: "0000-0001-6232-9096"
    email: "daniel@activeinference.institute"
    affiliation: "Active Inference Institute"
    corresponding: true

keywords:
  - "newspaper layout"
  - "typography"
  - "reportlab"
  - "reproducible publishing"
  - "document engineering"

publication:
  # Intended standalone GitHub repo for the double-publication (GitHub + Zenodo).
  # The repo + Zenodo deposit are created by a maintainer via
  # `scripts/publish_project_release.py`; `doi` / `version_doi` / `version_record`
  # are written back here on the first deposit. Until then this exemplar ships
  # in-repo and the generated publication table lists it as not-yet-deposited.
  github_repository: "docxology/template_newspaper"
  doi: "10.5281/zenodo.20533675"  # Concept DOI — stable citation
  version_doi: "10.5281/zenodo.20932039" # Latest Zenodo deposit
  version_record: "https://zenodo.org/records/20932039"
  year: "2026"  # Zenodo publication_date / deposit description year
  published_artifacts:
    ipfs_pinata: "https://gateway.pinata.cloud/ipfs/QmUsept2d9X3sz42whTgEGM9TjdxjzSqxnuyPCbu3pPwku"
    huggingface_hub: "https://huggingface.co/datasets/ActiveInference/template_newspaper"
    osf: "https://osf.io/tzwf8/"
    pypi: "https://test.pypi.org/project/template-newspaper/1.0.2/"
    netlify: "https://6a4441f8d6dc10153d77788d--tranquil-kleicha-0c9203.netlify.app"
    github_pages: "https://docxology.github.io/template_newspaper/"
    software_heritage: "https://archive.softwareheritage.org/browse/origin/?origin_url=https://github.com/docxology/template_newspaper"

metadata:
  license: "MIT"
  language: "en"

manuscript_dir: "manuscript"
